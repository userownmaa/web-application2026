{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Статистика посещений по страницам</h2>
    <a href="{{ url_for('reports.export_visits_by_pages') }}" class="btn btn-success">
        Экспорт в CSV
    </a>
</div>

<div class="table-responsive">
    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>№</th>
                <th>Страница</th>
                <th>Количество посещений</th>
            </tr>
        </thead>
        <tbody>
            {% for stat in stats %}
            <tr>
                <td>{{ loop.index }}</td>
                <td><code>{{ stat.path }}</code></td>
                <td><span class="badge bg-primary">{{ stat.visit_count }}</span></td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" class="text-center py-4 text-muted">Статистика отсутствует</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="mt-3">
    <a href="{{ url_for('reports.visit_logs') }}" class="btn btn-secondary">Назад к журналу</a>
    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">На главную</a>
</div>
{% endblock %}
